<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SIP vs Lump Sum investment comparison diagram">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1D4ED8"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F0F7FF"/><stop offset="100%" stop-color="#DBEAFE"/></linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <rect width="800" height="68" fill="url(#hg)"/>
  <text x="30" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="21" font-weight="700" fill="white">SIP vs Lump Sum — Investment Strategy Comparison</text>
  <text x="30" y="57" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#93C5FD">Same total investment, different outcome due to rupee cost averaging · per SEBI mutual fund guidelines</text>
  <!-- SIP column -->
  <rect x="30" y="84" width="360" height="222" rx="10" fill="white" stroke="#93C5FD" stroke-width="2"/>
  <rect x="30" y="84" width="360" height="34" rx="10" fill="#DBEAFE"/>
  <rect x="30" y="104" width="360" height="14" fill="#DBEAFE"/>
  <text x="210" y="107" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#1D4ED8" text-anchor="middle" font-weight="700">SIP — Systematic Investment Plan</text>
  <text x="210" y="138" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569" text-anchor="middle">₹10,000 per month × 10 years</text>
  <text x="210" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569" text-anchor="middle">Total Invested: ₹12,00,000</text>
  <text x="210" y="184" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569" text-anchor="middle">Expected Return: 12% p.a.</text>
  <text x="210" y="214" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#059669" text-anchor="middle" font-weight="800">₹23.2 Lakh</text>
  <text x="210" y="234" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#64748B" text-anchor="middle">corpus at maturity</text>
  <text x="60" y="262" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569">✓ Rupee cost averaging</text>
  <text x="60" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569">✓ Lower risk from market timing</text>
  <text x="60" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569">✓ Builds financial discipline</text>
  <!-- Lump Sum column -->
  <rect x="410" y="84" width="360" height="222" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="410" y="84" width="360" height="34" rx="10" fill="#F0F9FF"/>
  <rect x="410" y="104" width="360" height="14" fill="#F0F9FF"/>
  <text x="590" y="107" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#0891B2" text-anchor="middle" font-weight="700">Lump Sum Investment</text>
  <text x="590" y="138" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569" text-anchor="middle">₹12,00,000 invested at once</text>
  <text x="590" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569" text-anchor="middle">Held for: 10 years</text>
  <text x="590" y="184" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569" text-anchor="middle">Expected Return: 12% p.a.</text>
  <text x="590" y="214" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#0891B2" text-anchor="middle" font-weight="800">₹37.3 Lakh</text>
  <text x="590" y="234" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#64748B" text-anchor="middle">corpus at maturity</text>
  <text x="440" y="262" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569">✓ Full compounding from day 1</text>
  <text x="440" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569">✗ Needs capital upfront</text>
  <text x="440" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569">✗ Timing risk if market falls</text>
  <!-- Insight -->
  <rect x="30" y="320" width="740" height="42" rx="8" fill="#EFF6FF"/>
  <text x="55" y="337" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1E40AF" font-weight="600">Verdict:</text>
  <text x="112" y="337" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569"> Lump Sum wins if you invest at market lows. SIP wins if you can't time markets. For most salaried investors: SIP.</text>
  <text x="55" y="354" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">Both strategies beat savings accounts (3.5%) and FDs (7%) significantly over 10+ year horizons.</text>
  <text x="770" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94A3B8" text-anchor="end">calculox.in</text>
</svg>
