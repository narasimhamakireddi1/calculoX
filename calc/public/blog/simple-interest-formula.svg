<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Simple Interest formula diagram">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1D4ED8"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F0F7FF"/><stop offset="100%" stop-color="#DBEAFE"/></linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <rect width="800" height="68" fill="url(#hg)"/>
  <text x="30" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="21" font-weight="700" fill="white">Simple Interest Formula</text>
  <text x="30" y="57" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#93C5FD">Linear interest calculation · used in short-term loans &amp; basic savings</text>
  <!-- Formulas side by side -->
  <rect x="30" y="84" width="355" height="116" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="207" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="600" text-anchor="middle">SIMPLE INTEREST</text>
  <text x="207" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="800" fill="#1D4ED8" text-anchor="middle">SI</text>
  <text x="247" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="400" fill="#475569"> = </text>
  <!-- SI fraction -->
  <text x="320" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="19" font-weight="600" fill="#1E3A8A">P × R × T</text>
  <line x1="310" y1="140" x2="440" y2="140" stroke="#2563EB" stroke-width="2.5"/>
  <text x="370" y="164" font-family="system-ui,-apple-system,sans-serif" font-size="19" font-weight="600" fill="#1E3A8A">100</text>
  <rect x="415" y="84" width="355" height="116" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="592" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="600" text-anchor="middle">TOTAL AMOUNT</text>
  <text x="592" y="152" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="800" fill="#059669" text-anchor="middle">A  =  P  +  SI</text>
  <text x="592" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#64748B" text-anchor="middle">Principal + Interest earned</text>
  <!-- Legend -->
  <rect x="30" y="214" width="740" height="40" rx="8" fill="#EFF6FF"/>
  <text x="55" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">P</text>
  <text x="64" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569"> = Principal (₹)</text>
  <text x="200" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">R</text>
  <text x="210" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569"> = Annual rate (%)</text>
  <text x="380" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">T</text>
  <text x="389" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569"> = Time (years)  ·  SI compounds linearly, not exponentially</text>
  <!-- Example -->
  <rect x="30" y="268" width="740" height="94" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="55" y="293" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B" font-weight="600" letter-spacing="1">WORKED EXAMPLE</text>
  <text x="55" y="315" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#334155">₹50,000 invested  ·  8% p.a.  ·  3 years</text>
  <rect x="55" y="326" width="290" height="24" rx="6" fill="#EFF6FF"/>
  <text x="200" y="343" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" text-anchor="middle" font-weight="600">SI = 50000 × 8 × 3 ÷ 100 = ₹12,000</text>
  <rect x="365" y="326" width="360" height="24" rx="6" fill="#F0FDF4"/>
  <text x="545" y="343" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#166534" text-anchor="middle" font-weight="600">Total Amount = ₹50,000 + ₹12,000 = ₹62,000</text>
  <text x="770" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94A3B8" text-anchor="end">calculox.in</text>
</svg>
