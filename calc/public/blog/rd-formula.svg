<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Recurring Deposit formula diagram">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1D4ED8"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F0F7FF"/><stop offset="100%" stop-color="#DBEAFE"/></linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <rect width="800" height="68" fill="url(#hg)"/>
  <text x="30" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="21" font-weight="700" fill="white">Recurring Deposit — Maturity Formula</text>
  <text x="30" y="57" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#93C5FD">Quarterly compounding on monthly deposits · per RBI Schedule Bank regulations</text>
  <!-- Formula box -->
  <rect x="30" y="84" width="740" height="116" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="60" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="800" fill="#1D4ED8">M</text>
  <text x="90" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="400" fill="#475569"> = </text>
  <text x="130" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#1E3A8A">R  ×  </text>
  <!-- Fraction -->
  <text x="230" y="124" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#1E3A8A">[ (1 + r)<tspan dy="-9" font-size="11" font-weight="700">n</tspan><tspan dy="9">  —  1 ]</tspan></text>
  <line x1="220" y1="138" x2="490" y2="138" stroke="#2563EB" stroke-width="2.5"/>
  <text x="326" y="162" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#1E3A8A">r</text>
  <text x="498" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#1E3A8A">  ×  (1 + r)</text>
  <!-- Legend -->
  <rect x="30" y="214" width="740" height="40" rx="8" fill="#EFF6FF"/>
  <text x="55" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">M</text>
  <text x="65" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569"> = Maturity amount</text>
  <text x="232" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">R</text>
  <text x="242" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569"> = Monthly instalment</text>
  <text x="415" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">r</text>
  <text x="423" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569"> = Quarterly rate (Annual ÷ 400)</text>
  <text x="668" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">n</text>
  <text x="676" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569"> = Quarters</text>
  <!-- Example -->
  <rect x="30" y="268" width="740" height="94" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="55" y="293" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B" font-weight="600" letter-spacing="1">WORKED EXAMPLE</text>
  <text x="55" y="315" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#334155">₹5,000/month RD  ·  7% p.a.  ·  5 years (60 months / 20 quarters)</text>
  <rect x="55" y="326" width="310" height="24" rx="6" fill="#F0FDF4"/>
  <text x="210" y="343" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#166534" text-anchor="middle" font-weight="600">Maturity Amount = ₹3,56,830</text>
  <rect x="385" y="326" width="350" height="24" rx="6" fill="#EFF6FF"/>
  <text x="560" y="343" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" text-anchor="middle" font-weight="600">Invested = ₹3,00,000  ·  Interest = ₹56,830</text>
  <text x="770" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94A3B8" text-anchor="end">calculox.in</text>
</svg>
