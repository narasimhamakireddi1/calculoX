<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Percentage formula diagram">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#5B21B6"/><stop offset="100%" stop-color="#7C3AED"/></linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F5F3FF"/><stop offset="100%" stop-color="#EDE9FE"/></linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <rect width="800" height="68" fill="url(#hg)"/>
  <text x="30" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="21" font-weight="700" fill="white">Percentage Formulas — 4 Essential Calculations</text>
  <text x="30" y="57" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#C4B5FD">Universal mathematical formulas for all percentage problems</text>
  <!-- Box 1: X% of Y -->
  <rect x="30" y="84" width="355" height="84" rx="10" fill="white" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="55" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6D28D9" font-weight="600">WHAT IS X% OF Y?</text>
  <text x="55" y="136" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#1E3A8A">Result  =  Y  ×  (X ÷ 100)</text>
  <text x="55" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748B">e.g. 15% of ₹5,000 = ₹750</text>
  <!-- Box 2: % Change -->
  <rect x="415" y="84" width="355" height="84" rx="10" fill="white" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="440" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6D28D9" font-weight="600">PERCENTAGE CHANGE</text>
  <text x="440" y="136" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#1E3A8A">% = (New — Old) ÷ Old × 100</text>
  <text x="440" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748B">e.g. ₹100 → ₹120  = +20% rise</text>
  <!-- Box 3: What % -->
  <rect x="30" y="182" width="355" height="84" rx="10" fill="white" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="55" y="206" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6D28D9" font-weight="600">WHAT % IS X OF Y?</text>
  <text x="55" y="234" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#1E3A8A">%  =  (X ÷ Y)  ×  100</text>
  <text x="55" y="256" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748B">e.g. 30 out of 150 = 20%</text>
  <!-- Box 4: Reverse % -->
  <rect x="415" y="182" width="355" height="84" rx="10" fill="white" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="440" y="206" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6D28D9" font-weight="600">REVERSE PERCENTAGE</text>
  <text x="440" y="234" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#1E3A8A">Original  =  Result ÷ (1 ± X%)</text>
  <text x="440" y="256" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748B">e.g. ₹120 after 20% hike → original ₹100</text>
  <!-- Example row -->
  <rect x="30" y="280" width="740" height="82" rx="10" fill="white" stroke="#EDE9FE" stroke-width="1.5"/>
  <text x="55" y="305" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B" font-weight="600" letter-spacing="1">REAL WORLD EXAMPLE — Salary Hike</text>
  <text x="55" y="327" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#334155">Salary: ₹50,000  ·  Hike: 12%  →  New Salary = ₹50,000 × 1.12 = </text>
  <text x="605" y="327" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#059669" font-weight="700">₹56,000</text>
  <text x="55" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569">Hike amount = ₹6,000  |  Percentage of old salary = 6000 ÷ 50000 × 100 = 12%</text>
  <text x="770" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94A3B8" text-anchor="end">calculox.in</text>
</svg>
