<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GST calculation breakdown diagram">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1D4ED8"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F0F7FF"/><stop offset="100%" stop-color="#DBEAFE"/></linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <rect width="800" height="68" fill="url(#hg)"/>
  <text x="30" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="21" font-weight="700" fill="white">GST Calculation — Goods &amp; Services Tax</text>
  <text x="30" y="57" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#93C5FD">GST Council rate structure · effective from 2017 unified tax reform</text>
  <!-- Two formulas -->
  <rect x="30" y="84" width="358" height="104" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="209" y="106" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="600" text-anchor="middle">ADD GST  (exclusive → inclusive)</text>
  <text x="209" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#1E3A8A" text-anchor="middle">GST Amt = Base × Rate ÷ 100</text>
  <text x="209" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#1E3A8A" text-anchor="middle">Total = Base + GST Amount</text>
  <rect x="412" y="84" width="358" height="104" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="591" y="106" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="600" text-anchor="middle">REMOVE GST  (inclusive → exclusive)</text>
  <text x="591" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#1E3A8A" text-anchor="middle">Base = Total × 100 ÷ (100 + Rate)</text>
  <text x="591" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#1E3A8A" text-anchor="middle">GST Amt = Total – Base</text>
  <!-- GST Rate bands -->
  <rect x="30" y="202" width="740" height="42" rx="8" fill="#EFF6FF"/>
  <text x="100" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748B" text-anchor="middle">Essential goods</text>
  <text x="100" y="236" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#1E40AF" text-anchor="middle" font-weight="700">0%</text>
  <text x="270" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748B" text-anchor="middle">Basics, transport</text>
  <text x="270" y="236" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#1E40AF" text-anchor="middle" font-weight="700">5%</text>
  <text x="430" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748B" text-anchor="middle">Processed food, services</text>
  <text x="430" y="236" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#1E40AF" text-anchor="middle" font-weight="700">12%</text>
  <text x="610" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748B" text-anchor="middle">Standard rate (most goods)</text>
  <text x="610" y="236" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#D97706" text-anchor="middle" font-weight="700">18%</text>
  <text x="745" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748B" text-anchor="middle">Luxury</text>
  <text x="745" y="236" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#DC2626" text-anchor="middle" font-weight="700">28%</text>
  <!-- Example -->
  <rect x="30" y="258" width="740" height="104" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="55" y="283" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B" font-weight="600" letter-spacing="1">WORKED EXAMPLE  (18% GST)</text>
  <text x="55" y="305" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#334155">Service bill base price: ₹1,000</text>
  <rect x="55" y="316" width="210" height="30" rx="6" fill="#EFF6FF"/>
  <text x="160" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" text-anchor="middle" font-weight="600">Base = ₹1,000</text>
  <text x="280" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#64748B">+</text>
  <rect x="300" y="316" width="210" height="30" rx="6" fill="#FEF9C3"/>
  <text x="405" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#713F12" text-anchor="middle" font-weight="600">GST (18%) = ₹180</text>
  <text x="520" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#64748B">=</text>
  <rect x="540" y="316" width="210" height="30" rx="6" fill="#F0FDF4"/>
  <text x="645" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#166534" text-anchor="middle" font-weight="600">Total = ₹1,180</text>
  <text x="770" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94A3B8" text-anchor="end">calculox.in</text>
</svg>
