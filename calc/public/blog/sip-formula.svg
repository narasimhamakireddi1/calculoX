<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SIP Return Formula diagram">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1D4ED8"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F0F7FF"/><stop offset="100%" stop-color="#DBEAFE"/></linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <rect width="800" height="68" fill="url(#hg)"/>
  <text x="30" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="21" font-weight="700" fill="white">SIP Return Formula — Systematic Investment Plan</text>
  <text x="30" y="57" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#93C5FD">Compound growth formula · compliant with AMFI/SEBI SIP standards</text>
  <!-- Formula box -->
  <rect x="30" y="84" width="740" height="116" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="60" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="30" font-weight="800" fill="#1D4ED8">FV</text>
  <text x="108" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="400" fill="#475569"> = </text>
  <!-- Numerator of bracket -->
  <text x="155" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="19" font-weight="600" fill="#1E3A8A">P  ×  [ (1 + r)<tspan dy="-10" font-size="12" font-weight="700">n</tspan><tspan dy="10">  —  1 ]</tspan></text>
  <!-- Division bar -->
  <line x1="155" y1="143" x2="520" y2="143" stroke="#2563EB" stroke-width="2.5"/>
  <!-- Denominator -->
  <text x="285" y="166" font-family="system-ui,-apple-system,sans-serif" font-size="19" font-weight="600" fill="#1E3A8A">r</text>
  <text x="520" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="19" font-weight="600" fill="#1E3A8A">  ×  (1 + r)</text>
  <!-- Legend -->
  <rect x="30" y="214" width="740" height="40" rx="8" fill="#EFF6FF"/>
  <text x="55" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">FV</text>
  <text x="76" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569"> = Future corpus value</text>
  <text x="265" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">P</text>
  <text x="276" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569"> = Monthly SIP amount</text>
  <text x="455" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">r</text>
  <text x="463" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569"> = Monthly rate</text>
  <text x="600" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">n</text>
  <text x="610" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569"> = Months</text>
  <!-- Example -->
  <rect x="30" y="268" width="740" height="94" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="55" y="293" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B" font-weight="600" letter-spacing="1">WORKED EXAMPLE</text>
  <text x="55" y="315" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#334155">₹5,000/month SIP  ·  12% p.a. return  ·  10 years (120 months)</text>
  <rect x="55" y="326" width="310" height="24" rx="6" fill="#F0FDF4"/>
  <text x="210" y="343" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#166534" text-anchor="middle" font-weight="600">Final Corpus = ₹11,61,695</text>
  <rect x="385" y="326" width="340" height="24" rx="6" fill="#EFF6FF"/>
  <text x="555" y="343" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" text-anchor="middle" font-weight="600">Total Invested = ₹6,00,000 · Gain = ₹5,61,695</text>
  <text x="770" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94A3B8" text-anchor="end">calculox.in</text>
</svg>
