<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="120" fill="rgba(255, 255, 255, 0.1)"/>
  <circle cx="1100" cy="530" r="150" fill="rgba(255, 255, 255, 0.08)"/>
  <circle cx="600" cy="50" r="100" fill="rgba(255, 255, 255, 0.05)"/>

  <!-- Main content -->
  <g>
    <!-- Logo/Icon -->
    <text x="600" y="200" font-size="120" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">
      🧮
    </text>

    <!-- Title -->
    <text x="600" y="320" font-size="80" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">
      CalculoX
    </text>

    <!-- Subtitle -->
    <text x="600" y="400" font-size="42" text-anchor="middle" fill="rgba(255, 255, 255, 0.9)" font-family="Arial, sans-serif">
      11 Smart Calculators
    </text>

    <!-- Tagline -->
    <text x="600" y="460" font-size="32" text-anchor="middle" fill="rgba(255, 255, 255, 0.75)" font-family="Arial, sans-serif">
      Financial & Personal Calculations Made Easy
    </text>

    <!-- URL -->
    <text x="600" y="550" font-size="24" text-anchor="middle" fill="rgba(255, 255, 255, 0.6)" font-family="Arial, sans-serif">
      www.calculox.in
    </text>
  </g>
</svg>