<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mutual fund selection checklist diagram">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1D4ED8"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F0F7FF"/><stop offset="100%" stop-color="#DBEAFE"/></linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <rect width="800" height="68" fill="url(#hg)"/>
  <text x="30" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="21" font-weight="700" fill="white">How to Select a Mutual Fund — 10 Criteria</text>
  <text x="30" y="57" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#93C5FD">SEBI AMFI guidelines · per NISM Series V-A certification framework</text>
  <!-- 10 criteria in 2 columns -->
  <!-- Column 1 -->
  <rect x="30" y="84" width="365" height="30" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1"/>
  <text x="55" y="104" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">1. Fund Category</text>
  <text x="240" y="104" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">Match goal: Large Cap / Flexi / Index</text>
  <rect x="30" y="120" width="365" height="30" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1"/>
  <text x="55" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">2. Expense Ratio</text>
  <text x="240" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">Direct &lt;0.5% · Regular &lt;1.5%</text>
  <rect x="30" y="156" width="365" height="30" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1"/>
  <text x="55" y="176" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">3. 5-Year CAGR</text>
  <text x="240" y="176" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">Beat benchmark by 2%+ consistently</text>
  <rect x="30" y="192" width="365" height="30" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1"/>
  <text x="55" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">4. Standard Deviation</text>
  <text x="240" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">Lower = less volatile (risk measure)</text>
  <rect x="30" y="228" width="365" height="30" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1"/>
  <text x="55" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">5. Sharpe Ratio</text>
  <text x="240" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">Above 1.0 = good risk-adjusted return</text>
  <!-- Column 2 -->
  <rect x="405" y="84" width="365" height="30" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1"/>
  <text x="430" y="104" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">6. AUM Size</text>
  <text x="570" y="104" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">₹500Cr+ for stability</text>
  <rect x="405" y="120" width="365" height="30" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1"/>
  <text x="430" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">7. Fund Manager Tenure</text>
  <text x="570" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">3+ years with this fund</text>
  <rect x="405" y="156" width="365" height="30" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1"/>
  <text x="430" y="176" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">8. Portfolio Concentration</text>
  <text x="570" y="176" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">Top 10 stocks &lt;60% of portfolio</text>
  <rect x="405" y="192" width="365" height="30" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1"/>
  <text x="430" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">9. Downside Capture</text>
  <text x="570" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">Lower than 100% = protected falls</text>
  <rect x="405" y="228" width="365" height="30" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1"/>
  <text x="430" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="700">10. Consistency (Rolling)</text>
  <text x="570" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">Beat benchmark in 70%+ of 3yr rolls</text>
  <!-- Key recommendation -->
  <rect x="30" y="272" width="740" height="90" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="55" y="296" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#334155" font-weight="600">Top Recommendation for New SIP Investors:</text>
  <text x="55" y="316" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569">Start with a Nifty 50 Index Fund (expense ratio ~0.1–0.2%). Beats 80%+ of active funds over 10+ years.</text>
  <text x="55" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569">Then add: 1 Flexi-cap fund + 1 Mid-cap fund as portfolio grows above ₹5L.</text>
  <text x="55" y="354" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B">Source: SEBI AMFI data · NISM Series V-A training material · SEBI circular SEBI/HO/IMD/DF2/CIR/P/2019/101</text>
  <text x="770" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94A3B8" text-anchor="end">calculox.in</text>
</svg>
