<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BMI Formula diagram">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#BE185D"/><stop offset="100%" stop-color="#EC4899"/></linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF1F5"/><stop offset="100%" stop-color="#FCE7F3"/></linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <rect width="800" height="68" fill="url(#hg)"/>
  <text x="30" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="21" font-weight="700" fill="white">BMI Formula — Body Mass Index</text>
  <text x="30" y="57" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#FBCFE8">WHO classification · adapted for Indian population by ICMR guidelines</text>
  <!-- Formula box -->
  <rect x="30" y="84" width="740" height="90" rx="10" fill="white" stroke="#FBCFE8" stroke-width="1.5"/>
  <text x="100" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="30" font-weight="800" fill="#BE185D">BMI</text>
  <text x="180" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="400" fill="#64748B"> = </text>
  <!-- Fraction -->
  <text x="270" y="124" font-family="system-ui,-apple-system,sans-serif" font-size="19" font-weight="600" fill="#831843">Weight  (kg)</text>
  <line x1="250" y1="134" x2="490" y2="134" stroke="#DB2777" stroke-width="2.5"/>
  <text x="265" y="156" font-family="system-ui,-apple-system,sans-serif" font-size="19" font-weight="600" fill="#831843">[ Height (m) ]<tspan dy="-9" font-size="12" font-weight="700">2</tspan></text>
  <!-- Imperial note -->
  <text x="540" y="124" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569">  Imperial:</text>
  <text x="540" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#831843">  703 × lbs / in²</text>
  <!-- BMI Categories -->
  <rect x="30" y="188" width="170" height="54" rx="8" fill="#EFF6FF"/>
  <text x="115" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1E40AF" text-anchor="middle" font-weight="600">Underweight</text>
  <text x="115" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#2563EB" text-anchor="middle" font-weight="700">BMI &lt; 18.5</text>
  <rect x="210" y="188" width="170" height="54" rx="8" fill="#F0FDF4"/>
  <text x="295" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#166534" text-anchor="middle" font-weight="600">Normal Weight</text>
  <text x="295" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#16A34A" text-anchor="middle" font-weight="700">18.5 — 22.9</text>
  <rect x="390" y="188" width="170" height="54" rx="8" fill="#FFFBEB"/>
  <text x="475" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#92400E" text-anchor="middle" font-weight="600">Overweight</text>
  <text x="475" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#D97706" text-anchor="middle" font-weight="700">23.0 — 27.4</text>
  <rect x="570" y="188" width="200" height="54" rx="8" fill="#FEF2F2"/>
  <text x="670" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#991B1B" text-anchor="middle" font-weight="600">Obese (Indian cutoff)</text>
  <text x="670" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#DC2626" text-anchor="middle" font-weight="700">BMI ≥ 27.5</text>
  <!-- Example -->
  <rect x="30" y="256" width="740" height="106" rx="10" fill="white" stroke="#FCE7F3" stroke-width="1.5"/>
  <text x="55" y="281" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B" font-weight="600" letter-spacing="1">WORKED EXAMPLE</text>
  <text x="55" y="303" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#334155">Person: 70 kg  ·  Height: 1.72 m</text>
  <text x="55" y="323" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#334155">BMI = 70 ÷ (1.72)² = 70 ÷ 2.9584 = </text>
  <text x="415" y="323" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#16A34A" font-weight="700">23.66 → Normal Weight ✓</text>
  <text x="55" y="346" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748B">Note: ICMR recommends Indian-specific cutoffs (Normal: 18.5–22.9; Overweight: 23–27.4)</text>
  <text x="770" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94A3B8" text-anchor="end">calculox.in</text>
</svg>
