  <text x="290" y="223" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">6.5–7.5%</text>
  <text x="430" y="223" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#059669" text-anchor="middle">Very Low</text>
  <text x="540" y="223" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#D97706" text-anchor="middle">Medium (penalty)</text>
  <text x="660" y="223" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#D97706" text-anchor="middle">5yr FD: 80C</text>
  <line x1="30" y1="235" x2="770" y2="235" stroke="#E0F2FE" stroke-width="1"/>
  <text x="55" y="253" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#334155" font-weight="600">Gold / Sovereign Gold Bond</text>
  <text x="290" y="253" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">8–10% + 2.5% interest</text>
  <text x="430" y="253" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#D97706" text-anchor="middle">Medium</text>
  <text x="540" y="253" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#D97706" text-anchor="middle">8yr lock (exit 5+)</text>
  <text x="660" y="253" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#059669" text-anchor="middle">CGT exempt (maturity)</text>
  <line x1="30" y1="265" x2="770" y2="265" stroke="#E0F2FE" stroke-width="1"/>
  <text x="55" y="283" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#334155" font-weight="600">Direct Stocks (NSE/BSE)</text>
  <text x="290" y="283" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#059669" text-anchor="middle" font-weight="600">Varies (0–30%+)</text>
  <text x="430" y="283" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#DC2626" text-anchor="middle">High</text>
  <text x="540" y="283" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#059669" text-anchor="middle">Very High (T+1)</text>
  <text x="660" y="283" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#DC2626" text-anchor="middle">None (LTCG 12.5%)</text>
  <!-- Col dividers -->
  <line x1="205" y1="84" x2="205" y2="312" stroke="#E0F2FE" stroke-width="1"/>
  <line x1="370" y1="84" x2="370" y2="312" stroke="#E0F2FE" stroke-width="1"/>
  <line x1="490" y1="84" x2="490" y2="312" stroke="#E0F2FE" stroke-width="1"/>
  <line x1="600" y1="84" x2="600" y2="312" stroke="#E0F2FE" stroke-width="1"/>
  <!-- Summary -->
  <rect x="30" y="326" width="740" height="46" rx="8" fill="#EFF6FF"/>
  <text x="55" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" font-weight="600">Recommended allocation (age 30):</text>
  <text x="300" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569"> 60% Equity MF · 20% PPF/NPS · 10% Gold · 10% FD (emergency)</text>
  <text x="55" y="364" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B">Source: SEBI investor awareness · AMFI India · RBI monetary policy · Finance Act 2025-26</text>
  <text x="770" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94A3B8" text-anchor="end">calculox.in</text>
</svg>
