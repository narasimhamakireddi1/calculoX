<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CAGR Formula diagram">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1D4ED8"/><stop offset="100%" stop-color="#0891B2"/></linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F0F9FF"/><stop offset="100%" stop-color="#E0F2FE"/></linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <rect width="800" height="68" fill="url(#hg)"/>
  <text x="30" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="21" font-weight="700" fill="white">CAGR Formula — Compound Annual Growth Rate</text>
  <text x="30" y="57" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#BAE6FD">Gold standard for measuring investment performance · per SEBI disclosure standards</text>
  <!-- Formula box -->
  <rect x="30" y="84" width="740" height="116" rx="10" fill="white" stroke="#BAE6FD" stroke-width="1.5"/>
  <text x="60" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="800" fill="#1D4ED8">CAGR</text>
  <text x="165" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="400" fill="#475569"> = </text>
  <!-- Main formula -->
  <text x="210" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#1E3A8A">  Ending Value</text>
  <line x1="210" y1="132" x2="440" y2="132" stroke="#0891B2" stroke-width="2.5"/>
  <text x="208" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#1E3A8A">  Beginning Value</text>
  <text x="447" y="138" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#0E7490">(</text>
  <text x="463" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="600" fill="#1E3A8A">1 / n</text>
  <line x1="460" y1="126" x2="520" y2="126" stroke="#0891B2" stroke-width="1.5"/>
  <text x="480" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#0E7490">)</text>
  <text x="510" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="600" fill="#1E3A8A">  —  1</text>
  <!-- Legend -->
  <rect x="30" y="214" width="740" height="40" rx="8" fill="#F0F9FF"/>
  <text x="55" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#0E7490" font-weight="700">Ending Value</text>
  <text x="148" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569"> = current investment value</text>
  <text x="390" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#0E7490" font-weight="700">Beginning Value</text>
  <text x="503" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569"> = initial invested amount</text>
  <text x="720" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#0E7490" font-weight="700">n</text>
  <text x="728" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#475569"> = years</text>
  <!-- Example -->
  <rect x="30" y="268" width="740" height="94" rx="10" fill="white" stroke="#E0F2FE" stroke-width="1.5"/>
  <text x="55" y="293" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B" font-weight="600" letter-spacing="1">WORKED EXAMPLE</text>
  <text x="55" y="315" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#334155">Investment: ₹1,00,000  →  grew to  ₹2,00,000  over  5 years</text>
  <rect x="55" y="326" width="320" height="24" rx="6" fill="#F0FDF4"/>
  <text x="215" y="343" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#166534" text-anchor="middle" font-weight="600">CAGR = (2/1)^(1/5) – 1 = 14.87%</text>
  <rect x="395" y="326" width="350" height="24" rx="6" fill="#F0F9FF"/>
  <text x="570" y="343" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#0E7490" text-anchor="middle" font-weight="600">Meaning: money doubled at 14.87% per year</text>
  <text x="770" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94A3B8" text-anchor="end">calculox.in</text>
</svg>
