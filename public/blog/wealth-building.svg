<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wealth building principles diagram">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1D4ED8"/><stop offset="100%" stop-color="#7C3AED"/></linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F0F7FF"/><stop offset="100%" stop-color="#F5F3FF"/></linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <rect width="800" height="68" fill="url(#hg)"/>
  <text x="30" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="21" font-weight="700" fill="white">10 Wealth-Building Principles — Long-Term Growth</text>
  <text x="30" y="57" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#C4B5FD">Time-tested principles backed by RBI · SEBI · AMFI investor education frameworks</text>
  <!-- Principles in 2 columns -->
  <!-- Left: 1-5 -->
  <rect x="30" y="84" width="370" height="28" rx="6" fill="white" stroke="#DBEAFE" stroke-width="1"/>
  <text x="55" y="102" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1D4ED8" font-weight="700">1. Start Early</text>
  <text x="170" y="102" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569"> — ₹5K/mo at 22 = 3× more than starting at 32</text>
  <rect x="30" y="118" width="370" height="28" rx="6" fill="white" stroke="#DBEAFE" stroke-width="1"/>
  <text x="55" y="136" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1D4ED8" font-weight="700">2. Pay Yourself First</text>
  <text x="215" y="136" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569"> — Auto-debit SIP before spending</text>
  <rect x="30" y="152" width="370" height="28" rx="6" fill="white" stroke="#DBEAFE" stroke-width="1"/>
  <text x="55" y="170" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1D4ED8" font-weight="700">3. Eliminate High-Interest Debt</text>
  <text x="280" y="170" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569"> — No investment beats 24% CC debt</text>
  <rect x="30" y="186" width="370" height="28" rx="6" fill="white" stroke="#DBEAFE" stroke-width="1"/>
  <text x="55" y="204" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1D4ED8" font-weight="700">4. Diversify Assets</text>
  <text x="195" y="204" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569"> — Equity + Debt + Gold + Real Estate</text>
  <rect x="30" y="220" width="370" height="28" rx="6" fill="white" stroke="#DBEAFE" stroke-width="1"/>
  <text x="55" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1D4ED8" font-weight="700">5. Step-Up Annually</text>
  <text x="200" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569"> — Increase SIP 10%/yr with salary hike</text>
  <!-- Right: 6-10 -->
  <rect x="410" y="84" width="360" height="28" rx="6" fill="white" stroke="#EDE9FE" stroke-width="1"/>
  <text x="435" y="102" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#7C3AED" font-weight="700">6. Tax Efficiency</text>
  <text x="560" y="102" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569"> — 80C + LTCG strategy = more returns</text>
  <rect x="410" y="118" width="360" height="28" rx="6" fill="white" stroke="#EDE9FE" stroke-width="1"/>
  <text x="435" y="136" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#7C3AED" font-weight="700">7. Never Time the Market</text>
  <text x="600" y="136" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569"> — Stay invested through cycles</text>
  <rect x="410" y="152" width="360" height="28" rx="6" fill="white" stroke="#EDE9FE" stroke-width="1"/>
  <text x="435" y="170" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#7C3AED" font-weight="700">8. Keep Costs Low</text>
  <text x="558" y="170" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569"> — Direct MF, discount broker, zero AMC</text>
  <rect x="410" y="186" width="360" height="28" rx="6" fill="white" stroke="#EDE9FE" stroke-width="1"/>
  <text x="435" y="204" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#7C3AED" font-weight="700">9. Rebalance Yearly</text>
  <text x="568" y="204" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569"> — Restore target allocation annually</text>
  <rect x="410" y="220" width="360" height="28" rx="6" fill="white" stroke="#EDE9FE" stroke-width="1"/>
  <text x="435" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#7C3AED" font-weight="700">10. Have a Written Plan</text>
  <text x="590" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569"> — Goals → timeline → amounts</text>
  <!-- Power of compounding example -->
  <rect x="30" y="262" width="740" height="100" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="55" y="286" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#334155" font-weight="600">The Power of Compounding — Why Starting Early Matters</text>
  <!-- Bar visual -->
  <text x="55" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">Start at 22, invest ₹5K/mo for 38 yrs @ 12%:</text>
  <rect x="310" y="299" width="430" height="18" rx="4" fill="#059669"/>
  <text x="748" y="313" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#059669" font-weight="700"> ₹5.17 Cr</text>
  <text x="55" y="338" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">Start at 32, invest ₹5K/mo for 28 yrs @ 12%:</text>
  <rect x="310" y="327" width="175" height="18" rx="4" fill="#D97706"/>
  <text x="492" y="341" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#D97706" font-weight="700"> ₹1.73 Cr</text>
  <text x="55" y="354" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B">10-year delay = 3× less wealth from the SAME monthly investment. Time is the most powerful wealth multiplier.</text>
  <text x="770" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94A3B8" text-anchor="end">calculox.in</text>
</svg>
