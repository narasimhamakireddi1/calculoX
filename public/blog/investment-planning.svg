<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Investment planning framework diagram">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1D4ED8"/><stop offset="100%" stop-color="#0891B2"/></linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F0F9FF"/><stop offset="100%" stop-color="#E0F2FE"/></linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <rect width="800" height="68" fill="url(#hg)"/>
  <text x="30" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="21" font-weight="700" fill="white">Complete Investment Planning — 5 Pillar Framework</text>
  <text x="30" y="57" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#BAE6FD">RBI · SEBI · AMFI guidelines for individual investors in India</text>
  <!-- 5 pillars -->
  <!-- Pillar 1 -->
  <rect x="30" y="84" width="136" height="184" rx="10" fill="white" stroke="#BAE6FD" stroke-width="1.5"/>
  <rect x="30" y="84" width="136" height="32" rx="10" fill="#DBEAFE"/>
  <rect x="30" y="102" width="136" height="14" fill="#DBEAFE"/>
  <text x="98" y="107" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#1D4ED8" text-anchor="middle" font-weight="700">STEP 1</text>
  <text x="98" y="136" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E3A8A" text-anchor="middle" font-weight="700">Emergency Fund</text>
  <text x="98" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">3–6 months</text>
  <text x="98" y="174" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">of expenses</text>
  <text x="98" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">in liquid FD</text>
  <text x="98" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">or savings</text>
  <text x="98" y="256" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#059669" text-anchor="middle" font-weight="600">Do FIRST</text>
  <!-- Pillar 2 -->
  <rect x="176" y="84" width="136" height="184" rx="10" fill="white" stroke="#BAE6FD" stroke-width="1.5"/>
  <rect x="176" y="84" width="136" height="32" rx="10" fill="#DBEAFE"/>
  <rect x="176" y="102" width="136" height="14" fill="#DBEAFE"/>
  <text x="244" y="107" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#1D4ED8" text-anchor="middle" font-weight="700">STEP 2</text>
  <text x="244" y="136" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E3A8A" text-anchor="middle" font-weight="700">Insurance</text>
  <text x="244" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">Term: 10× salary</text>
  <text x="244" y="174" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">Health: ₹5–10L</text>
  <text x="244" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">family floater</text>
  <text x="244" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">Pure term policy</text>
  <!-- Pillar 3 -->
  <rect x="322" y="84" width="136" height="184" rx="10" fill="white" stroke="#BAE6FD" stroke-width="1.5"/>
  <rect x="322" y="84" width="136" height="32" rx="10" fill="#DBEAFE"/>
  <rect x="322" y="102" width="136" height="14" fill="#DBEAFE"/>
  <text x="390" y="107" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#1D4ED8" text-anchor="middle" font-weight="700">STEP 3</text>
  <text x="390" y="136" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E3A8A" text-anchor="middle" font-weight="700">Debt Management</text>
  <text x="390" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">Repay high-rate</text>
  <text x="390" y="174" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">debt first</text>
  <text x="390" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">&gt;10%: repay</text>
  <text x="390" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">before investing</text>
  <!-- Pillar 4 -->
  <rect x="468" y="84" width="136" height="184" rx="10" fill="white" stroke="#BAE6FD" stroke-width="1.5"/>
  <rect x="468" y="84" width="136" height="32" rx="10" fill="#DBEAFE"/>
  <rect x="468" y="102" width="136" height="14" fill="#DBEAFE"/>
  <text x="536" y="107" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#1D4ED8" text-anchor="middle" font-weight="700">STEP 4</text>
  <text x="536" y="136" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E3A8A" text-anchor="middle" font-weight="700">Invest &amp; Grow</text>
  <text x="536" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">Equity MF via SIP</text>
  <text x="536" y="174" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">PPF: ₹1.5L/yr</text>
  <text x="536" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">NPS: extra 80CCD</text>
  <text x="536" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">50/30/20 rule</text>
  <!-- Pillar 5 -->
  <rect x="614" y="84" width="156" height="184" rx="10" fill="white" stroke="#BAE6FD" stroke-width="1.5"/>
  <rect x="614" y="84" width="156" height="32" rx="10" fill="#DBEAFE"/>
  <rect x="614" y="102" width="156" height="14" fill="#DBEAFE"/>
  <text x="692" y="107" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#1D4ED8" text-anchor="middle" font-weight="700">STEP 5</text>
  <text x="692" y="136" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E3A8A" text-anchor="middle" font-weight="700">Retirement Planning</text>
  <text x="692" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">25× annual expense</text>
  <text x="692" y="174" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">corpus target</text>
  <text x="692" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">NPS + PPF +</text>
  <text x="692" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569" text-anchor="middle">Equity MF combo</text>
  <!-- 50/30/20 rule -->
  <rect x="30" y="282" width="740" height="80" rx="10" fill="white" stroke="#E0F2FE" stroke-width="1.5"/>
  <text x="55" y="306" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#334155" font-weight="600">50/30/20 Budget Rule:</text>
  <rect x="55" y="318" width="210" height="26" rx="6" fill="#DCFCE7"/>
  <text x="160" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#166534" text-anchor="middle" font-weight="600">50% — Needs</text>
  <rect x="285" y="318" width="210" height="26" rx="6" fill="#DBEAFE"/>
  <text x="390" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#1E40AF" text-anchor="middle" font-weight="600">30% — Wants</text>
  <rect x="515" y="318" width="240" height="26" rx="6" fill="#FEF9C3"/>
  <text x="635" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#713F12" text-anchor="middle" font-weight="600">20% — Save &amp; Invest</text>
  <text x="55" y="352" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B">Source: RBI financial literacy guidelines · SEBI investor education · NISM certified framework</text>
  <text x="770" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94A3B8" text-anchor="end">calculox.in</text>
</svg>
